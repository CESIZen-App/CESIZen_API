name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore CESIZen_API.Tests/CESIZen_API.Tests.csproj

      - name: Build
        run: dotnet build CESIZen_API.Tests/CESIZen_API.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test CESIZen_API.Tests/CESIZen_API.Tests.csproj --no-build -c Release --verbosity normal
